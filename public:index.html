<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideBeam — Pizarra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060608;
    --surface: #0f0f14;
    --border: #1a1a28;
    --accent: #00e5a0;
    --accent-glow: rgba(0,229,160,0.2);
    --text: #f0f0f8;
    --muted: #4a4a6a;
    --danger: #ff4d6d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    height: 100vh; overflow: hidden;
    transition: background 0.5s ease;
  }

  body.light-mode {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #e0e0e8;
    --text: #111118;
    --muted: #8888a0;
  }

  /* ── WAITING SCREEN ── */
  #waiting {
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2.5rem;
    background: radial-gradient(ellipse at 50% 60%, rgba(0,229,160,0.06) 0%, transparent 70%),
                var(--bg);
  }

  .logo-display {
    font-size: 3rem; font-weight: 900; letter-spacing: -0.04em;
    background: linear-gradient(135deg, #00e5a0 0%, #00b4d8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .waiting-row {
    display: flex; align-items: center; gap: 4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem 3rem;
  }

  #qr-wrapper {
    background: #fff;
    padding: 16px; border-radius: 14px;
    box-shadow: 0 0 40px rgba(0,229,160,0.25),
                0 0 80px rgba(0,229,160,0.1);
  }

  .waiting-info { display: flex; flex-direction: column; gap: 1rem; }

  .step {
    display: flex; align-items: flex-start; gap: 0.75rem;
    font-size: 0.95rem; color: var(--muted); max-width: 260px;
  }

  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent-glow); color: var(--accent);
    font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }

  .code-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 500;
    color: var(--accent); letter-spacing: 0.12em;
    background: var(--accent-glow);
    padding: 0.6rem 1.4rem; border-radius: 10px;
    border: 1px solid rgba(0,229,160,0.25);
    text-align: center; margin-top: 0.5rem;
  }

  /* ── PRESENTATION SCREEN ── */
  #presentation {
    display: none;
    height: 100vh; flex-direction: column;
    background: var(--bg); position: relative;
  }

  #canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; cursor: none;
  }

  #pdf-canvas {
    max-width: 100%; max-height: 100%;
    display: block;
    transition: opacity 0.12s ease;
    border-radius: 2px;
  }

  #pdf-canvas.fading { opacity: 0; }

  /* Laser pointer */
  #laser {
    position: fixed;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff2d55 0%, rgba(255,45,85,0.4) 60%, transparent 100%);
    box-shadow: 0 0 8px 2px rgba(255,45,85,0.6);
    pointer-events: none;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 100;
    transition: left 0.04s linear, top 0.04s linear;
  }

  /* HUD */
  #hud {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem;
    background: linear-gradient(to top, rgba(6,6,8,0.9), transparent);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #hud.visible { opacity: 1; }

  .hud-left, .hud-right {
    display: flex; align-items: center; gap: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; color: rgba(255,255,255,0.5);
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Slide transition overlay */
  #slide-flash {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.05);
    pointer-events: none; opacity: 0;
    z-index: 90;
  }

  /* Connection toast */
  #toast {
    position: fixed; top: 1.5rem; right: 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1.25rem;
    font-size: 0.85rem; color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    transform: translateY(-20px); opacity: 0;
    transition: all 0.3s ease; z-index: 200;
    display: flex; align-items: center; gap: 0.6rem;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.green { border-color: var(--accent); color: var(--accent); }
  #toast.red { border-color: var(--danger); color: var(--danger); }

  .fullscreen-hint {
    font-size: 0.8rem; color: var(--muted); text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div id="waiting">
  <div class="logo-display">SlideBeam</div>

  <div class="waiting-row">
    <div id="qr-wrapper"></div>
    <div class="waiting-info">
      <div class="step">
        <div class="step-num">1</div>
        <span>Abre <strong>slidebeam.app</strong> en tu móvil o escanea el QR</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Introduce el código de sesión:</span>
      </div>
      <div class="code-display" id="code-display">— — — —</div>
      <div class="step">
        <div class="step-num">3</div>
        <span>Sube tu PDF y empieza a presentar</span>
      </div>
      <div class="fullscreen-hint">Pulsa <kbd>F</kbd> para pantalla completa</div>
    </div>
  </div>
</div>

<div id="presentation">
  <div id="canvas-area">
    <canvas id="pdf-canvas"></canvas>
  </div>
  <div id="laser"></div>
  <div id="hud">
    <div class="hud-left">
      <div class="status-dot"></div>
      <span id="hud-status">Conectado</span>
    </div>
    <div class="hud-right">
      <span id="hud-pages">1 / 1</span>
    </div>
  </div>
</div>

<div id="slide-flash"></div>
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let sessionId = null;
let socket = null;
let hudTimer = null;

// ── Init: create session ──
async function init() {
  const res = await fetch('/api/session', { method: 'POST' });
  const data = await res.json();
  sessionId = data.sessionId;

  document.getElementById('code-display').textContent = sessionId;

  // Generate QR
  const url = `${window.location.origin}/remote?session=${sessionId}`;
  new QRCode(document.getElementById('qr-wrapper'), {
    text: url,
    width: 200, height: 200,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  connectSocket();
}

function connectSocket() {
  socket = io();

  socket.on('connect', () => {
    socket.emit('join-display', { sessionId });
  });

  socket.on('joined', () => showToast('🖥️ Pantalla lista', 'green'));

  socket.on('pdf-ready', async ({ pdfData, currentPage: page }) => {
    await loadPDF(pdfData);
    showPresentation();
  });

  socket.on('go-to-page', ({ page }) => {
    renderPage(page);
  });

  socket.on('laser-move', ({ x, y }) => {
    const laser = document.getElementById('laser');
    const canvas = document.getElementById('pdf-canvas');
    const rect = canvas.getBoundingClientRect();
    laser.style.display = 'block';
    laser.style.left = (rect.left + x * rect.width) + 'px';
    laser.style.top = (rect.top + y * rect.height) + 'px';
  });

  socket.on('laser-off', () => {
    document.getElementById('laser').style.display = 'none';
  });

  socket.on('set-dark', ({ dark }) => {
    document.body.classList.toggle('light-mode', !dark);
    showToast(dark ? '🌙 Modo oscuro' : '☀️ Modo claro', 'green');
  });

  socket.on('remote-disconnected', () => showToast('📱 Móvil desconectado', 'red'));
  socket.on('display-disconnected', () => {});
}

// ── Load PDF ──
async function loadPDF(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

  pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;

  socket.emit('report-pages', { totalPages, currentPage });
}

// ── Render page ──
async function renderPage(num) {
  if (!pdfDoc || num < 1 || num > totalPages) return;
  currentPage = num;

  const canvas = document.getElementById('pdf-canvas');
  canvas.classList.add('fading');
  await delay(120);

  const page = await pdfDoc.getPage(num);
  const area = document.getElementById('canvas-area');
  const scale = Math.min(
    area.offsetWidth / page.getViewport({ scale: 1 }).width,
    area.offsetHeight / page.getViewport({ scale: 1 }).height
  ) * 0.96;

  const vp = page.getViewport({ scale });
  canvas.width = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

  canvas.classList.remove('fading');

  // Flash
  flashSlide();

  // Update HUD
  document.getElementById('hud-pages').textContent = `${num} / ${totalPages}`;
  showHud();

  // Report back to remote
  socket.emit('report-pages', { totalPages, currentPage });
}

function showPresentation() {
  document.getElementById('waiting').style.display = 'none';
  const pres = document.getElementById('presentation');
  pres.style.display = 'flex';
  renderPage(1);
}

function flashSlide() {
  const f = document.getElementById('slide-flash');
  f.style.opacity = '1';
  setTimeout(() => { f.style.transition = 'opacity 0.3s'; f.style.opacity = '0'; }, 50);
}

function showHud() {
  const hud = document.getElementById('hud');
  hud.classList.add('visible');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => hud.classList.remove('visible'), 2500);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3000);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.key === 'ArrowRight' || e.key === ' ') renderPage(currentPage + 1);
  if (e.key === 'ArrowLeft') renderPage(currentPage - 1);
});

// Load QRCode lib then init
const qrScript = document.createElement('script');
qrScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
qrScript.onload = init;
document.head.appendChild(qrScript);
</script>
</body>
</html>
